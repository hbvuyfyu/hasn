version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hasn
      POSTGRES_USER: hasn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hasnsecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hasn:${POSTGRES_PASSWORD:-hasnsecret}@postgres:5432/hasn
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
      NODE_ENV: production
      PORT: 8080
    ports:
      - "80:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
